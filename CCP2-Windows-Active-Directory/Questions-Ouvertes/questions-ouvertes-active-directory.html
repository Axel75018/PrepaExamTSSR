<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Questions ouvertes - CCP2 Windows Server / Active Directory</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color: #111827; background: #f8fafc; }
    body { margin: 0; }
    header { background: #111827; color: white; padding: 26px 18px; text-align: center; }
    header h1 { margin: 0 0 10px; font-size: clamp(1.4rem, 4vw, 2rem); }
    main { max-width: 1050px; margin: 0 auto; padding: 24px 18px 80px; }
    .card { background: white; border: 1px solid #d1d5db; border-radius: 14px; padding: 18px; margin: 16px 0; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .question h2 { margin: 0 0 12px; font-size: 1.15rem; }
    .points { color: #4b5563; font-weight: 700; }
    .statement { margin: 12px 0; line-height: 1.55; }
    textarea { width: 100%; min-height: 170px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px; font: inherit; resize: vertical; }
    button { border: 0; border-radius: 10px; padding: 11px 16px; font-weight: 700; cursor: pointer; margin: 8px 8px 0 0; }
    .primary { background: #2563eb; color: white; }
    .secondary { background: #e5e7eb; color: #111827; }
    .danger { background: #fee2e2; color: #991b1b; }
    .correction { display: none; background: #f3f4f6; border-left: 5px solid #2563eb; padding: 14px; border-radius: 10px; margin-top: 14px; line-height: 1.55; white-space: normal; }
    .correction.visible { display: block; }
    .correction pre, .correction code { white-space: pre-wrap; overflow-wrap: anywhere; }
    .scoreline { margin-top: 14px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input[type="number"] { width: 90px; padding: 9px; border: 1px solid #cbd5e1; border-radius: 9px; font: inherit; }
    .toolbar { position: sticky; bottom: 0; background: rgba(248,250,252,.96); border-top: 1px solid #e5e7eb; padding: 14px 0; backdrop-filter: blur(8px); }
    .result { font-size: 1.25rem; font-weight: 800; }
    .muted { color: #6b7280; }
    .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Questions ouvertes - CCP2 Windows Server / Active Directory</h1>
    <p>Réponds, affiche la correction, puis auto-évalue ta réponse.</p>
  </header>

  <main>
    <section id="status" class="card">Chargement des questions…</section>
    <section id="result" class="card hidden"></section>
    <section id="questions"></section>
    <div class="toolbar hidden" id="toolbar">
      <button class="primary" type="button" id="scoreBtn">Calculer mon score</button>
      <button class="secondary" type="button" id="showAllBtn">Afficher toutes les corrections</button>
      <button class="danger" type="button" id="resetBtn">Nouvelle tentative</button>
    </div>
  </main>

<script>
const QUESTIONS_URL = "https://raw.githubusercontent.com/Axel75018/PrepaExamTSSR/main/CCP2-Windows-Active-Directory/Questions-Ouvertes/Evaluation/QUESTIONS-OUVERTES-CCP2-Windows-AD-15Q.md";
const CORRECTIONS_URL = "https://raw.githubusercontent.com/Axel75018/PrepaExamTSSR/main/CCP2-Windows-Active-Directory/Questions-Ouvertes/Correction/QUESTIONS-OUVERTES-CCP2-Windows-AD-15Q-CORRECTIONS.md";

const statusEl = document.getElementById("status");
const questionsEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const toolbarEl = document.getElementById("toolbar");

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function markdownLite(md) {
  let html = escapeHtml(md || "");
  html = html.replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>");
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/^\s*-\s+(.+)$/gm, "• $1");
  html = html.replace(/\n/g, "<br>");
  return html;
}

function cleanQuestionText(text) {
  return text
    .replace(/\*\*Votre réponse\*\*\s*:\s*```[\s\S]*?```/i, "")
    .replace(/\*\*Votre réponse\*\*\s*:/i, "")
    .replace(/_{5,}/g, "")
    .replace(/---/g, "")
    .trim();
}

function parseQuestions(md) {
  const regex = /##\s*QUESTION\s+(\d+)\s*:\s*(.*?)\s*\((\d+)\s*points?\)([\s\S]*?)(?=\s*---\s*##\s*QUESTION\s+\d+\s*:|\s*---\s*##\s*AUTO|$)/gi;
  const questions = [];
  let match;
  while ((match = regex.exec(md)) !== null) {
    questions.push({
      num: Number(match[1]),
      title: match[2].trim(),
      points: Number(match[3]),
      statement: cleanQuestionText(match[4])
    });
  }
  return questions;
}

function parseCorrections(md) {
  const regex = /##\s*✔️?\s*Question\s+(\d+)\s*:\s*(.*?)\s*\((\d+)\s*points?\)([\s\S]*?)(?=\s*---\s*##\s*✔️?\s*Question\s+\d+\s*:|\s*---\s*##|$)/gi;
  const corrections = new Map();
  let match;
  while ((match = regex.exec(md)) !== null) {
    let content = match[4]
      .replace(/^\s*\*\*Énoncé\*\*\s*:[\s\S]*?\*\*Réponse modèle\*\*\s*:/i, "")
      .replace(/\*\*Réponse modèle\*\*\s*:/i, "")
      .replace(/\*\*Points\*\*\s*:\s*\d+\s*\/\s*\d+\s*$/i, "")
      .trim();
    corrections.set(Number(match[1]), content);
  }
  return corrections;
}

function render(questions, corrections) {
  const total = questions.reduce((sum, q) => sum + q.points, 0);
  questionsEl.innerHTML = questions.map(q => `
    <article class="card question" id="q${q.num}">
      <h2>Question ${q.num} — ${escapeHtml(q.title)} <span class="points">(${q.points} pts)</span></h2>
      <div class="statement">${markdownLite(q.statement)}</div>
      <textarea id="answer-${q.num}" placeholder="Écris ta réponse ici..."></textarea>
      <div>
        <button class="secondary" type="button" onclick="toggleCorrection(${q.num})">Afficher / masquer la correction</button>
      </div>
      <div class="correction" id="correction-${q.num}">
        <strong>Correction modèle :</strong><br><br>${markdownLite(corrections.get(q.num) || "Correction non trouvée.")}
      </div>
      <div class="scoreline">
        <label for="score-${q.num}"><strong>Auto-note :</strong></label>
        <input type="number" id="score-${q.num}" min="0" max="${q.points}" step="0.5" placeholder="0" />
        <span class="muted">/ ${q.points} pts</span>
      </div>
    </article>
  `).join("");

  statusEl.innerHTML = `<strong>${questions.length} questions chargées.</strong> Total : ${total} points.`;
  toolbarEl.classList.remove("hidden");
}

function toggleCorrection(num) {
  document.getElementById(`correction-${num}`).classList.toggle("visible");
}

function calculateScore() {
  const inputs = [...document.querySelectorAll('input[type="number"]')];
  const totalMax = inputs.reduce((sum, input) => sum + Number(input.max || 0), 0);
  const score = inputs.reduce((sum, input) => sum + Math.min(Number(input.value || 0), Number(input.max || 0)), 0);
  const percent = totalMax ? Math.round((score / totalMax) * 100) : 0;
  const note20 = totalMax ? ((score / totalMax) * 20).toFixed(1) : "0.0";

  resultEl.classList.remove("hidden");
  resultEl.innerHTML = `<div class="result">Score : ${score} / ${totalMax} — ${percent}% — Note : ${note20} / 20</div>`;
  resultEl.scrollIntoView({ behavior: "smooth", block: "start" });
}

function showAllCorrections() {
  document.querySelectorAll(".correction").forEach(el => el.classList.add("visible"));
}

function resetAttempt() {
  document.querySelectorAll("textarea").forEach(el => el.value = "");
  document.querySelectorAll('input[type="number"]').forEach(el => el.value = "");
  document.querySelectorAll(".correction").forEach(el => el.classList.remove("visible"));
  resultEl.classList.add("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("scoreBtn").addEventListener("click", calculateScore);
document.getElementById("showAllBtn").addEventListener("click", showAllCorrections);
document.getElementById("resetBtn").addEventListener("click", resetAttempt);

async function init() {
  try {
    const [qRes, cRes] = await Promise.all([fetch(QUESTIONS_URL), fetch(CORRECTIONS_URL)]);
    if (!qRes.ok) throw new Error(`Questions introuvables : HTTP ${qRes.status}`);
    if (!cRes.ok) throw new Error(`Corrections introuvables : HTTP ${cRes.status}`);

    const [qMd, cMd] = await Promise.all([qRes.text(), cRes.text()]);
    const questions = parseQuestions(qMd);
    const corrections = parseCorrections(cMd);

    if (!questions.length) {
      statusEl.classList.add("error");
      statusEl.innerHTML = "<strong>Erreur :</strong> Aucune question détectée.";
      return;
    }

    render(questions, corrections);
  } catch (err) {
    statusEl.classList.add("error");
    statusEl.innerHTML = `<strong>Erreur de chargement :</strong> ${escapeHtml(err.message)}`;
  }
}

init();
</script>
</body>
</html>
